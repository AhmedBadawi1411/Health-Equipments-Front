<p-toast position="bottom-right"></p-toast>

<app-section-header
  actionLabel="الرجوع للقائمة"
  sectionTitle="تفاصيل المستخدم وإدارة الصلاحيات"
  actionIcon="pi pi-arrow-left"
  (onAddClickedEvent)="goBack()"
></app-section-header>

@if (user()) {
  <div class="flex flex-col gap-6">
    
    <!-- Row 1: Personal Profile & Role (Side-by-Side) -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
      
      <!-- User Profile Section -->
      <div class="form-wrapper  flex flex-col gap-4 justify-between">
        <div class="flex flex-col gap-4">
          <div class="text-base font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
            <i class="pi pi-user text-(--k-primary)"></i>
            <span>الملف الشخصي للمستخدم</span>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex flex-col gap-2">
              <label for="detailName" class="text-sm font-semibold text-gray-700 dark:text-gray-300">الاسم الكامل</label>
              <p-iconfield class="w-full">
                <input
                  id="detailName"
                  type="text"
                  pInputText
                  class="w-full h-11!"
                  [(ngModel)]="profileForm.name"
                />
                <p-inputicon class="pi pi-user" />
              </p-iconfield>
            </div>
            
            <div class="flex flex-col gap-2">
              <label for="detailEmail" class="text-sm font-semibold text-gray-700 dark:text-gray-300">البريد الإلكتروني</label>
              <p-iconfield class="w-full">
                <input
                  id="detailEmail"
                  type="email"
                  pInputText
                  class="w-full h-11! text-left"
                  [(ngModel)]="profileForm.email"
                />
                <p-inputicon class="pi pi-envelope" />
              </p-iconfield>
            </div>
          </div>
        </div>
        
        <div class="flex justify-end mt-2">
          <button
            pButton
            label="تحديث الملف الشخصي"
            icon="pi pi-save"
            class="w-full  h-11! px-6!"
            [loading]="isSavingProfile"
            (click)="saveProfile()"
          ></button>
        </div>
      </div>

      <!-- Role Assignment Section -->
      <div class="form-wrapper  flex flex-col gap-4 justify-between">
        <div class="flex flex-col gap-4">
          <div class="text-base font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
            <i class="pi pi-shield text-(--k-primary)"></i>
            <span>الدور الرئيسي</span>
          </div>
          
          <div class="flex flex-col gap-2">
            <label for="detailRole" class="text-sm font-semibold text-gray-700 dark:text-gray-300">الدور المسند</label>
            <p-select
              [options]="usersService.roles()"
              optionLabel="name"
              optionValue="id"
              placeholder="اختر دور المستخدم"
              class="w-full h-11!"
              id="detailRole"
              [(ngModel)]="selectedRoleId"
            ></p-select>
          </div>
        </div>

        <div class="flex justify-end mt-2">
          <button
            pButton
            label="حفظ الدور"
            icon="pi pi-lock"
            class="p-button-warning h-11! px-6! w-full "
            [loading]="isSavingRole"
            (click)="saveRole()"
          ></button>
        </div>
      </div>

    </div>

    <!-- Row 2: Facilities & Detailed Permissions (Side-by-Side) -->
    <div class="flex flex-row gap-6">
      
      <!-- Facility Assignment Section (1/3 Width) -->
      <div class="form-wrapper mt-0! xl:col-span-1 flex flex-col gap-4 justify-between flex-1">
        <div class="flex flex-col gap-4">
          <div class="text-base font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
            <i class="pi pi-building text-(--k-primary)"></i>
            <span>الجهات الطبية المسندة للمستخدم</span>
          </div>
          
          <div class="flex flex-col gap-3 max-h-72 overflow-y-auto border border-gray-100 dark:border-surface-800 rounded-xl p-4! bg-gray-50/50 dark:bg-surface-950/20" >
            <div *ngFor="let facility of facilitiesService.facilities()" class="flex items-center gap-3 py-1">
              <p-checkbox
                [value]="facility.facilityID"
                [(ngModel)]="selectedFacilityIds"
                [inputId]="'fac-' + facility.facilityID"
              ></p-checkbox>
              <label [for]="'fac-' + facility.facilityID" class="text-sm font-medium text-gray-800 dark:text-gray-200 cursor-pointer select-none">
                {{ facility.facilityName }}
              </label>
            </div>
            
            <div *ngIf="facilitiesService.facilities().length === 0" class="text-sm text-gray-500 text-center py-2">
              لا توجد منشآت صحية مسجلة حاليا بالمنظومة.
            </div>
          </div>
        </div>

        <div class="flex justify-end mt-2">
          <button
            pButton
            label="حفظ الجهات الطبية"
            icon="pi pi-check"
            class="p-button-info h-11! px-6! w-full"
            [loading]="isSavingFacilities"
            [disabled]="facilitiesService.facilities().length === 0"
            (click)="saveFacilities()"
          ></button>
        </div>
      </div>

      <!-- Detailed Permissions Section (2/3 Width) -->
      <div class="form-wrapper w-full! flex flex-col gap-4 justify-between flex-2 mt-0!">
        <div class="flex flex-col gap-4">
          <div class="text-base font-bold text-gray-800 dark:text-gray-100 mb-5 flex items-center justify-between">
            <span class="flex items-center gap-2">
              <i class="pi pi-sliders-h text-(--k-primary)"></i>
              الصلاحيات التفصيلية الممنوحة للمستخدم
            </span>

          </div>

          <!-- Permissions Matrix Table -->
          <div class="w-full">
            <p-table [value]="getModules()" [tableStyle]="{ 'min-width': '40rem' }">
              <ng-template #header>
                <tr>
                  <th>الوحدة البرمجية</th>
                  <th *ngFor="let op of operations" class="text-center">
                    {{ op.label }}
                  </th>
                </tr>
              </ng-template>
              <ng-template #body let-module>
                <tr>
                  <td>
                    <div class="flex items-center gap-2">
                      <i class="pi pi-folder-open text-(--k-primary)"></i>
                      <span class="font-bold">{{ module | moduleName }}</span>
                    </div>
                  </td>
                  <td *ngFor="let op of operations" class="text-center">
                    <ng-container *ngIf="getPermissionForModuleAndOperation(module, op.key) as perm">
                      <div class="flex flex-col items-center justify-center gap-1.5">
                        <p-checkbox
                          [value]="perm.id"
                          [(ngModel)]="selectedPermissionIds"
                          [inputId]="perm.id"
                        ></p-checkbox>
                        <label [for]="perm.id" class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 select-none cursor-pointer text-center font-medium block">
                          {{ perm.name }}
                        </label>
                      </div>
                    </ng-container>
                    <ng-container *ngIf="!getPermissionForModuleAndOperation(module, op.key)">
                      <span class="text-gray-300 dark:text-gray-600">-</span>
                    </ng-container>
                  </td>
                </tr>
              </ng-template>
            </p-table>
          </div>
        </div>

        <div class="flex justify-center gap-3 mt-8! w-full!">
          <button
            pButton
            type="button"
            label="حفظ الصلاحيات المخصصة"
            icon="pi pi-check"
            class="p-button-emerald h-11! w-full px-6!"
            [loading]="isSavingPermissions"
            (click)="savePermissions()"
          ></button>
        </div>
      </div>

    </div>

  </div>
}
