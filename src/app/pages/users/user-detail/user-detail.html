<p-toast position="bottom-right"></p-toast>

<app-section-header
  actionLabel="الرجوع للقائمة"
  sectionTitle="تفاصيل المستخدم وإدارة الصلاحيات"
  actionIcon="pi pi-arrow-left"
  (onAddClickedEvent)="goBack()"
></app-section-header>

@if (user()) {
  <div class="flex flex-col gap-6">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">

      <div class="form-wrapper flex flex-col gap-4 justify-between">
        <div class="flex flex-col gap-4">
          <div class="text-base font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
            <i class="pi pi-user text-(--k-primary)"></i>
            <span>الملف الشخصي للمستخدم</span>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex flex-col gap-2">
              <label for="detailName" class="text-sm font-semibold text-gray-700 dark:text-gray-300">الاسم الكامل</label>
              <p-iconfield class="w-full">
                <input id="detailName" type="text" pInputText class="w-full h-11!"
                  [(ngModel)]="profileForm.name"
                  [disabled]="!authService.hasPermission('user:update')" />
                <p-inputicon class="pi pi-user" />
              </p-iconfield>
            </div>
            <div class="flex flex-col gap-2">
              <label for="detailEmail" class="text-sm font-semibold text-gray-700 dark:text-gray-300">البريد الإلكتروني</label>
              <p-iconfield class="w-full">
                <input id="detailEmail" type="email" pInputText class="w-full h-11! text-left"
                  [(ngModel)]="profileForm.email"
                  [disabled]="!authService.hasPermission('user:update')" />
                <p-inputicon class="pi pi-envelope" />
              </p-iconfield>
            </div>
          </div>
        </div>
        <div class="flex justify-end mt-2" *ngIf="authService.hasPermission('user:update')">
          <button pButton label="تحديث الملف الشخصي" icon="pi pi-save"
            class="w-full h-11! px-6!" [loading]="isSavingProfile" (click)="saveProfile()"></button>
        </div>
      </div>

      <!-- Role Assignment -->
      <div class="form-wrapper flex flex-col gap-4 justify-between">
        <div class="flex flex-col gap-4">
          <div class="text-base font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
            <i class="pi pi-shield text-(--k-primary)"></i>
            <span>الدور الرئيسي</span>
          </div>
          <div class="flex flex-col gap-2">
            <label for="detailRole" class="text-sm font-semibold text-gray-700 dark:text-gray-300">الدور المسند</label>
            <p-select [options]="usersService.roles()" optionLabel="name" optionValue="id"
              placeholder="اختر دور المستخدم" class="w-full h-11!" id="detailRole"
              [(ngModel)]="selectedRoleId"
              (onChange)="onRoleChange($event.value)"
              [disabled]="!authService.hasPermission('user:assignRole')">
            </p-select>
          </div>
        </div>
        <div class="flex justify-end mt-2" *ngIf="authService.hasPermission('user:assignRole')">
          <button pButton label="حفظ الدور" icon="pi pi-lock"
            class="p-button-warning h-11! px-6! w-full" [loading]="isSavingRole" (click)="saveRole()"></button>
        </div>
      </div>
    </div>

    <!-- Row 2: Facilities & Permissions -->
    <div class="flex flex-row gap-6">

      <!-- Facilities -->
      <div class="form-wrapper mt-0! flex flex-col gap-4 flex-1">
        <div class="flex flex-col gap-4">
          <div class="text-base font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
            <i class="pi pi-building text-(--k-primary)"></i>
            <span>الجهات الطبية المسندة للمستخدم</span>
          </div>
          <div class="flex flex-col gap-3 overflow-y-auto border border-gray-100 dark:border-surface-800 rounded-xl p-4! bg-gray-50/50 dark:bg-surface-950/20">
            <!-- Select All Checkbox -->
            <div
              *ngIf="facilitiesService.facilities().length > 0"
              class="flex items-center gap-3 pb-2 border-b border-gray-100 dark:border-surface-800"
            >
              <p-checkbox
                [binary]="true"
                [ngModel]="isAllFacilitiesSelected()"
                (onChange)="toggleSelectAllFacilities($event.checked)"
                inputId="selectAllFacilities"
                [disabled]="!authService.hasPermission('user:assignFacilities')"
              ></p-checkbox>
              <label
                for="selectAllFacilities"
                class="text-sm font-bold text-gray-800 dark:text-gray-200 cursor-pointer select-none"
              >
                تحديد الكل
              </label>
            </div>

            <div *ngFor="let facility of facilitiesService.facilities()" class="flex items-center gap-3 py-1">
              <p-checkbox [value]="facility.facilityID" [(ngModel)]="selectedFacilityIds"
                [inputId]="'fac-' + facility.facilityID"
                [disabled]="!authService.hasPermission('user:assignFacilities')">
              </p-checkbox>
              <label [for]="'fac-' + facility.facilityID"
                class="text-sm font-medium text-gray-800 dark:text-gray-200 cursor-pointer select-none">
                {{ facility.facilityName }}
              </label>
            </div>
            <div *ngIf="facilitiesService.facilities().length === 0" class="text-sm text-gray-500 text-center py-2">
              لا توجد منشآت صحية مسجلة حاليا بالمنظومة.
            </div>
          </div>
        </div>
        <div class="flex justify-end mt-2" *ngIf="authService.hasPermission('user:assignFacilities')">
          <button pButton label="حفظ الجهات الطبية" icon="pi pi-check"
            class="p-button-info h-11! px-6! w-full" [loading]="isSavingFacilities"
            [disabled]="facilitiesService.facilities().length === 0"
            (click)="saveFacilities()"></button>
        </div>
      </div>

      <div class="form-wrapper w-full! flex flex-col gap-4 justify-between flex-2 mt-0!">
        <div class="flex flex-col gap-4">
          <div class="text-base font-bold text-gray-800 dark:text-gray-100 mb-5 flex items-center gap-2">
            <i class="pi pi-sliders-h text-(--k-primary)"></i>
            الصلاحيات التفصيلية الممنوحة للمستخدم
          </div>

          <div class="w-full">

            <p-table [value]="moduleRows()" [tableStyle]="{ 'min-width': '50rem' }">

              <ng-template #header>
                <tr>
                  <th>
                    <div class="flex items-center gap-3">
                      <p-checkbox [binary]="true" [ngModel]="allSelected()"
                        (onChange)="toggleSelectAll($event.checked)"
                        inputId="selectAllPerms"
                        [disabled]="!authService.hasPermission('user:assignPermissions')">
                      </p-checkbox>
                      <label for="selectAllPerms" class="font-bold cursor-pointer select-none">الوحدة البرمجية</label>
                    </div>
                  </th>
                  <th *ngFor="let op of operations" class="text-center">{{ op.label }}</th>
                  <th class="text-center w-56">صلاحيات إضافية</th>
                </tr>
              </ng-template>

              <ng-template #body let-row>
                <tr>
                  <td>
                    <div class="flex items-center gap-2">
                      <i class="pi pi-folder-open text-(--k-primary)"></i>
                      <span class="font-bold">{{ row.moduleLabel }}</span>
                    </div>
                  </td>

                  <td *ngFor="let op of operations" class="text-center">
                    <ng-container *ngIf="row[op.key].length > 0; else noOp">
                      <div class="flex flex-col items-center justify-center gap-1.5">
                        <p-checkbox [binary]="true"
                          [ngModel]="operationChecked().get(row.module + '|' + op.key)"
                          (onChange)="toggleOperation(row, op.key, $event.checked)"
                          [inputId]="row.module + '-' + op.key"
                          [disabled]="!authService.hasPermission('user:assignPermissions')">
                        </p-checkbox>
                        <span class="text-[10px] font-medium text-gray-500 dark:text-gray-400 select-none text-center block max-w-32 leading-tight mt-1!  px-1.5! py-0.5! rounded">
                          {{ op.label }} {{ row.moduleLabel }}
                        </span>
                      </div>
                    </ng-container>
                    <ng-template #noOp>
                      <span class="text-gray-300 dark:text-gray-600">-</span>
                    </ng-template>
                  </td>

                  <!-- OTHER / extra permissions column -->
                  <td class="text-center">
                    <ng-container *ngIf="row.OTHER.length > 0; else noOther">
                      <p-multiSelect
                        [options]="row.OTHER"
                        optionLabel="name"
                        optionValue="id"
                        placeholder="عمليات مخصصة"
                        appendTo="body"
                        [filter]="true"
                        filterPlaceholder="بحث..."
                        [maxSelectedLabels]="1"
                        selectedItemsLabel="{0} صلاحيات محددة"
                        class="w-full max-w-48 text-xs text-right"
                        [ngModel]="selectedOtherIds().get(row.module)"
                        (ngModelChange)="onOtherPermissionsChange(row, $event)"
                        [disabled]="!authService.hasPermission('user:assignPermissions')">
                      </p-multiSelect>
                    </ng-container>
                    <ng-template #noOther>
                      <span class="text-gray-300 dark:text-gray-600">-</span>
                    </ng-template>
                  </td>
                </tr>
              </ng-template>

            </p-table>
          </div>
        </div>

        <div class="flex justify-center gap-3 mt-8! w-full!" *ngIf="authService.hasPermission('user:assignPermissions')">
          <button pButton type="button" label="حفظ الصلاحيات المخصصة" icon="pi pi-check"
            class="p-button-emerald h-11! w-full px-6!"
            [loading]="isSavingPermissions" (click)="savePermissions()">
          </button>
        </div>
      </div>
    </div>

  </div>
}
