<p-toast position="bottom-right"></p-toast>

<div class="assets-layout">
  <div class="header">
    <app-section-header
      (onAddClickedEvent)="onAdd()"
      sectionTitle="إدارة طلبات الإحتياج"
      actionLabel="إضافة طلب جديد"
    ></app-section-header>
  </div>
  <div class="card mt-4!">
    <p-table
      [value]="needsService.requests()"
      [tableStyle]="{ 'min-width': '50rem' }"
      [paginator]="true"
      [rows]="15"
      [rowsPerPageOptions]="[10, 15, 30]"
      #requestsTable
    >
      <ng-template #caption>
        <div class="text-end pb-4">
          <p-button icon="pi pi-external-link" label="تصدير" (click)="requestsTable.exportCSV()" />
        </div>
      </ng-template>
      <ng-template #header>
        <tr>
          <th>المرفق الصحي</th>
          <th>القسم / الإدارة</th>
          <th>مقدم الطلب</th>
          <th>تاريخ التقديم</th>
          <th>عدد الأجهزة</th>
          <th>الإجراءات</th>
        </tr>
      </ng-template>
      <ng-template #body let-item>
        <tr>
          <td>{{ item.department?.facilityName }}</td>
          <td>{{ item.department?.departmentName }}</td>
          <td>{{ item.requestedBy }}</td>
          <td>{{ item.requestDate | date }}</td>
          <td>{{ item.items?.length || 0 }}</td>
          <td>
            <div class="flex flex-row gap-2">
              <p-button icon="pi pi-pencil" (click)="editRequest(item.requestId)" severity="secondary" rounded />
              <p-button icon="pi pi-trash" (click)="deleteRequest(item.requestId)" severity="danger" rounded />
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
