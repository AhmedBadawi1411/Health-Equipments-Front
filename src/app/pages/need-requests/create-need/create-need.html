<p-toast position="bottom-right"></p-toast>

<app-section-header
  [actionLabel]="'الرجوع للطلبات'"
  [sectionTitle]="editMode ? 'تعديل طلب احتياج' : 'إضافة طلب احتياج جديد'"
  actionIcon="pi pi-arrow-left"
  (onAddClickedEvent)="navigateBack()"
></app-section-header>

<div class="form-wrapper">
  <div class="flex flex-col gap-2">
    <label for="facilityId">الجهة الصحية</label>
    <p-select
      [options]="facilitesService.facilities()"
      optionLabel="facilityName"
      optionValue="facilityID"
      [filter]="true"
      filterBy="facilityName"
      [showClear]="true"
      placeholder="إختر الجهة الصحية"
      class="w-full h-10!"
      id="facilityId"
      [(ngModel)]="selectedFacilityId"
      (ngModelChange)="onFacilityChange($event)"
    >
    </p-select>
  </div>

  <div class="flex flex-col gap-2">
    <label for="departmentId">القسم / الإدارة</label>
    <p-select
      [options]="facilitesService.departments()"
      optionLabel="departmentName"
      optionValue="departmentID"
      [filter]="true"
      filterBy="departmentName"
      [showClear]="true"
      placeholder="إختر القسم / الإدارة"
      class="w-full h-10!"
      id="departmentId"
      [(ngModel)]="selectedDepartmentId"
      [disabled]="!selectedFacilityId"
    >
    </p-select>
  </div>

  <div class="flex flex-col gap-2 col-span-2">
    <label for="requestedBy">مقدم الطلب</label>
    <p-iconfield class="w-full">
      <input
        id="requestedBy"
        type="text"
        pInputText
        class="w-full"
        placeholder="مثال: د. أحمد المحمود"
        [(ngModel)]="requestedBy"
      />
      <p-inputicon class="pi pi-user" />
    </p-iconfield>
  </div>
</div>

<div class="font-bold text-xl text-surface-900 dark:text-surface-0 mt-6! mb-2! px-4!">تفاصيل الأجهزة المطلوبة</div>

<div class="form-wrapper mt-2!">
  <div class="flex flex-col gap-2">
    <label for="equipmentTypeId">نوع الجهاز</label>
    <p-select
      [options]="assetsService.assetMaster()"
      optionLabel="equipmentName"
      optionValue="equipmentTypeId"
      [filter]="true"
      filterBy="equipmentName"
      [showClear]="true"
      placeholder="إختر نوع الجهاز الطبي"
      class="w-full h-10!"
      id="equipmentTypeId"
      [(ngModel)]="currentItem.equipmentTypeId"
    >
    </p-select>
  </div>

  <div class="flex flex-col gap-2">
    <label for="quantity">الكمية المطلوبة</label>
    <p-iconfield class="w-full">
      <input
        id="quantity"
        type="number"
        pInputText
        class="w-full"
        placeholder="مثال: 5"
        [(ngModel)]="currentItem.quantity"
        min="1"
      />
      <p-inputicon class="pi pi-asterisk" />
    </p-iconfield>
  </div>

  <div class="flex flex-col gap-2 col-span-2">
    <label for="justification">التبرير / السبب</label>
    <p-iconfield class="w-full">
      <input
        id="justification"
        type="text"
        pInputText
        class="w-full"
        placeholder="مثال: للتوسع في الخدمة أو بديل لأجهزة تالفة"
        [(ngModel)]="currentItem.justification"
      />
      <p-inputicon class="pi pi-file-edit" />
    </p-iconfield>
  </div>
</div>

<div class="card flex justify-center mt-4!">
  <button
    pButton
    class="w-full! h-12! bg-gray-100! border-dashed!"
    [disabled]="!currentItem.equipmentTypeId || !currentItem.quantity || currentItem.quantity <= 0"
    (click)="addItem()"
  >
    <i class="pi pi-plus text-gray-700" pButtonIcon></i>
    <span pButtonLabel class="text-gray-700">
      {{ editingIndex !== null ? 'تحديث بيانات الجهاز في القائمة' : 'إضافة جهاز للطلب' }}
    </span>
  </button>
</div>

<div class="card mt-4!">
  <p-table
    [value]="requestItems()"
    [tableStyle]="{ 'min-width': '50rem' }"
    [paginator]="true"
    [rows]="15"
    [rowsPerPageOptions]="[10, 15, 30]"
    stripedRows
  >
    <ng-template #header>
      <tr>
        <th>نوع الجهاز</th>
        <th>الكمية</th>
        <th>التبرير</th>
        <th class="w-24">الاجراءات</th>
      </tr>
    </ng-template>
    <ng-template #body let-item let-i="rowIndex">
      <tr>
        <td>{{ assetsService.assetMasterMap().get(item.equipmentTypeId!) }}</td>
        <td>{{ item.quantity }}</td>
        <td>{{ item.justification || '-' }}</td>
        <td class="flex flex-row gap-2">
          <p-button icon="pi pi-trash" (click)="deleteItem(i)" severity="danger" rounded />
          <p-button icon="pi pi-pencil" (click)="editItem(i)" severity="secondary" rounded />
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<div class="card flex justify-center mt-4!">
  <button
    pButton
    class="w-full! h-12!"
    [disabled]="!selectedDepartmentId || !requestedBy || requestItems().length === 0 || isSaving"
    [loading]="isSaving"
    (click)="saveRequest()"
  >
    <i class="pi pi-check" pButtonIcon></i>
    <span pButtonLabel>{{ editMode ? 'تحديث الطلب' : 'حفظ الطلب' }}</span>
  </button>
</div>
