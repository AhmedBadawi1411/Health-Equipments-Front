<p-toast position="bottom-right"></p-toast>

<div class="categories-layout p-4!">
  <app-section-header sectionTitle="إدارة الفئات العلمية للأجهزة" [showAddButton]="false"></app-section-header>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">
    <!-- List of Categories (Right / Main Side) -->
    <div class="lg:col-span-2 card p-4! shadow-sm bg-white rounded-2xl">
      <div class="flex flex-row justify-between items-center mb-4!">
        <h3 class="text-lg font-bold text-gray-800">الفئات المسجلة</h3>
        <input 
          type="text" 
          pInputText 
          [value]="searchText()"
          (input)="searchText.set($any($event.target).value)"
          placeholder="بحث عن فئة..." 
          class="w-64 h-9 text-sm"
        />
      </div>

      <p-table
        [value]="filteredCategories()"
        [tableStyle]="{ 'min-width': '100%' }"
        [paginator]="true"
        [rows]="10"
        [rowsPerPageOptions]="[5, 10, 20]"
        class="text-sm"
      >
        <ng-template #header>
          <tr>
            <th>رقم الفئة</th>
            <th>اسم الفئة العلمية</th>
            <th>تاريخ الإضافة</th>
          </tr>
        </ng-template>
        <ng-template #body let-item>
          <tr>
            <td class="font-mono text-gray-500">#{{ item.categoryId }}</td>
            <td class="font-semibold text-primary">{{ item.categoryName }}</td>
            <td>{{ item.createdAt | date:'yyyy-MM-dd' }}</td>
          </tr>
        </ng-template>
        <ng-template #emptymessage>
          <tr>
            <td colspan="3" class="text-center py-8 text-gray-500">
              لا توجد فئات مسجلة تطابق البحث.
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>

    <!-- Create Category Form (Left Side) -->
    <div class="card p-5! shadow-sm bg-white rounded-2xl border border-gray-100 flex flex-col justify-between">
      <div>
        <h3 class="text-lg font-bold text-gray-800 mb-4! pb-2! border-b border-gray-100">إضافة فئة جديدة</h3>
        
        <div class="flex flex-col gap-4">
          <div class="flex flex-col gap-1.5">
            <label for="catName" class="text-sm font-medium text-gray-700">اسم الفئة العلمية <span class="text-red-500">*</span></label>
            <input 
              id="catName" 
              type="text" 
              pInputText 
              [(ngModel)]="categoryName" 
              placeholder="مثال: أجهزة التصوير الطبي"
              class="w-full h-10 text-sm" 
            />
          </div>
        </div>
      </div>

      <div class="mt-6 pt-4 border-t border-gray-100">
        <button 
          pButton 
          (click)="onSubmit()"
          class="w-full h-11 bg-primary text-white font-semibold flex items-center justify-center gap-2 rounded-xl hover:bg-primary-hover transition-all"
        >
          <i class="pi pi-check"></i>
          <span>حفظ البيانات</span>
        </button>
      </div>
    </div>
  </div>
</div>
