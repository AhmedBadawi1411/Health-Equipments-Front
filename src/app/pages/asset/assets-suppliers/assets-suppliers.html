<p-toast position="bottom-right"></p-toast>

<div class="suppliers-layout p-4!">
  <app-section-header sectionTitle="إدارة موردي الأجهزة الطبية" [showAddButton]="false"></app-section-header>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">
    <!-- List of Suppliers (Right / Main Side) -->
    <div class="lg:col-span-2 card p-4! shadow-sm bg-white rounded-2xl">
      <div class="flex flex-row justify-between items-center mb-4!">
        <h3 class="text-lg font-bold text-gray-800">الموردون المسجلون</h3>
        <input 
          type="text" 
          pInputText 
          [value]="searchText()"
          (input)="searchText.set($any($event.target).value)"
          placeholder="بحث بالاسم أو الهاتف أو البريد..." 
          class="w-64 h-9 text-sm"
        />
      </div>

      <p-table
        [value]="filteredSuppliers()"
        [tableStyle]="{ 'min-width': '100%' }"
        [paginator]="true"
        [rows]="10"
        [rowsPerPageOptions]="[5, 10, 20]"
        class="text-sm"
      >
        <ng-template #header>
          <tr>
            <th>اسم المورد</th>
            <th>الشخص المسؤول</th>
            <th>رقم الهاتف</th>
            <th>البريد الإلكتروني</th>
          </tr>
        </ng-template>
        <ng-template #body let-item>
          <tr>
            <td class="font-semibold text-primary">{{ item.supplierName }}</td>
            <td>{{ item.contactPerson || '-' }}</td>
            <td class="font-mono">{{ item.mobile || '-' }}</td>
            <td>{{ item.email || '-' }}</td>
          </tr>
        </ng-template>
        <ng-template #emptymessage>
          <tr>
            <td colspan="4" class="text-center py-8 text-gray-500">
              لا يوجد موردون مسجلون يطابقون البحث.
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>

    <!-- Create Supplier Form (Left Side) -->
    <div class="card p-5! shadow-sm bg-white rounded-2xl border border-gray-100 flex flex-col justify-between">
      <div>
        <h3 class="text-lg font-bold text-gray-800 mb-4! pb-2! border-b border-gray-100">إضافة مورد جديد</h3>
        
        <div class="flex flex-col gap-4">
          <div class="flex flex-col gap-1.5">
            <label for="supName" class="text-sm font-medium text-gray-700">اسم الشركة الموردة <span class="text-red-500">*</span></label>
            <input 
              id="supName" 
              type="text" 
              pInputText 
              [(ngModel)]="supplierName" 
              placeholder="مثال: شركة الخليج للمعدات الطبية"
              class="w-full h-10 text-sm" 
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label for="supContact" class="text-sm font-medium text-gray-700">الشخص المسؤول</label>
            <input 
              id="supContact" 
              type="text" 
              pInputText 
              [(ngModel)]="contactPerson" 
              placeholder="مثال: أحمد محمد"
              class="w-full h-10 text-sm" 
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label for="supMobile" class="text-sm font-medium text-gray-700">رقم الهاتف</label>
            <input 
              id="supMobile" 
              type="text" 
              pInputText 
              [(ngModel)]="mobile" 
              placeholder="مثال: 0501234567"
              class="w-full h-10 text-sm" 
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label for="supEmail" class="text-sm font-medium text-gray-700">البريد الإلكتروني</label>
            <input 
              id="supEmail" 
              type="email" 
              pInputText 
              [(ngModel)]="email" 
              placeholder="مثال: info@gulfmed.com"
              class="w-full h-10 text-sm" 
            />
          </div>
        </div>
      </div>

      <div class="mt-6 pt-4 border-t border-gray-100">
        <button 
          pButton 
          (click)="onSubmit()"
          class="w-full h-11 bg-primary text-white font-semibold flex items-center justify-center gap-2 rounded-xl hover:bg-primary-hover transition-all"
        >
          <i class="pi pi-check"></i>
          <span>حفظ البيانات</span>
        </button>
      </div>
    </div>
  </div>
</div>
