<p-toast position="bottom-right"></p-toast>

<div class="manufacturers-layout p-4!">
  <app-section-header sectionTitle="إدارة الشركات المصنعة للأجهزة" [showAddButton]="false"></app-section-header>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">
    <!-- List of Manufacturers (Right / Main Side) -->
    <div class="lg:col-span-2 card p-4! shadow-sm bg-white rounded-2xl">
      <div class="flex flex-row justify-between items-center mb-4!">
        <h3 class="text-lg font-bold text-gray-800">الشركات المصنعة المسجلة</h3>
        <input 
          type="text" 
          pInputText 
          [value]="searchText()"
          (input)="searchText.set($any($event.target).value)"
          placeholder="بحث عن شركة أو بلد..." 
          class="w-64 h-9 text-sm"
        />
      </div>

      <p-table
        [value]="filteredManufacturers()"
        [tableStyle]="{ 'min-width': '100%' }"
        [paginator]="true"
        [rows]="10"
        [rowsPerPageOptions]="[5, 10, 20]"
        class="text-sm"
      >
        <ng-template #header>
          <tr>
            <th>رقم الشركة</th>
            <th>اسم الشركة المصنعة</th>
            <th>بلد المنشأ</th>
            <th>تاريخ الإضافة</th>
          </tr>
        </ng-template>
        <ng-template #body let-item>
          <tr>
            <td class="font-mono text-gray-500">#{{ item.manufacturerId }}</td>
            <td class="font-semibold text-primary">{{ item.manufacturerName }}</td>
            <td>
              @if (item.country) {
                <span class="bg-blue-50 text-blue-700 px-2! py-0.5! rounded-full text-xs font-semibold">{{ item.country }}</span>
              } @else {
                <span class="text-gray-400">-</span>
              }
            </td>
            <td>{{ item.createdAt | date:'yyyy-MM-dd' }}</td>
          </tr>
        </ng-template>
        <ng-template #emptymessage>
          <tr>
            <td colspan="4" class="text-center py-8 text-gray-500">
              لا توجد شركات مصنعة مسجلة تطابق البحث.
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>

    <!-- Create Manufacturer Form (Left Side) -->
    <div class="card p-5! shadow-sm bg-white rounded-2xl border border-gray-100 flex flex-col justify-between">
      <div>
        <h3 class="text-lg font-bold text-gray-800 mb-4! pb-2! border-b border-gray-100">إضافة شركة مصنعة</h3>
        
        <div class="flex flex-col gap-4">
          <div class="flex flex-col gap-1.5">
            <label for="manName" class="text-sm font-medium text-gray-700">اسم الشركة المصنعة <span class="text-red-500">*</span></label>
            <input 
              id="manName" 
              type="text" 
              pInputText 
              [(ngModel)]="manufacturerName" 
              placeholder="مثال: Philips Medical Systems"
              class="w-full h-10 text-sm" 
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label for="manCountry" class="text-sm font-medium text-gray-700">بلد المنشأ</label>
            <input 
              id="manCountry" 
              type="text" 
              pInputText 
              [(ngModel)]="country" 
              placeholder="مثال: Netherlands"
              class="w-full h-10 text-sm" 
            />
          </div>
        </div>
      </div>

      <div class="mt-6 pt-4 border-t border-gray-100">
        <button 
          pButton 
          (click)="onSubmit()"
          class="w-full h-11 bg-primary text-white font-semibold flex items-center justify-center gap-2 rounded-xl hover:bg-primary-hover transition-all"
        >
          <i class="pi pi-check"></i>
          <span>حفظ البيانات</span>
        </button>
      </div>
    </div>
  </div>
</div>
