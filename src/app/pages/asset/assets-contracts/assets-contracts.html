<p-toast position="bottom-right"></p-toast>

<div class="contracts-layout p-4!">
  <app-section-header sectionTitle="إدارة عقود الصيانة للأجهزة الطبية" [showAddButton]="false"></app-section-header>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">
    <!-- List of Contracts (Right / Main Side) -->
    <div class="lg:col-span-2 card p-4! shadow-sm bg-white rounded-2xl">
      <div class="flex flex-row justify-between items-center mb-4!">
        <h3 class="text-lg font-bold text-gray-800">عقود الصيانة المسجلة</h3>
        <input 
          type="text" 
          pInputText 
          [value]="searchText()"
          (input)="searchText.set($any($event.target).value)"
          placeholder="بحث برقم العقد أو اسم المورد..." 
          class="w-64 h-9 text-sm"
        />
      </div>

      <p-table
        [value]="filteredContracts()"
        [tableStyle]="{ 'min-width': '100%' }"
        [paginator]="true"
        [rows]="10"
        [rowsPerPageOptions]="[5, 10, 20]"
        class="text-sm"
      >
        <ng-template #header>
          <tr>
            <th>رقم العقد</th>
            <th>المورد المتعاقد</th>
            <th>تاريخ البدء</th>
            <th>تاريخ الانتهاء</th>
          </tr>
        </ng-template>
        <ng-template #body let-item>
          <tr>
            <td class="font-semibold text-primary font-mono">{{ item.contractNumber }}</td>
            <td>{{ assetsHelper.suppliersMap().get(item.supplierId) || '-' }}</td>
            <td>{{ item.startDate | date:'yyyy-MM-dd' }}</td>
            <td>{{ item.endDate | date:'yyyy-MM-dd' }}</td>
          </tr>
        </ng-template>
        <ng-template #emptymessage>
          <tr>
            <td colspan="4" class="text-center py-8 text-gray-500">
              لا توجد عقود صيانة مسجلة تطابق البحث.
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>

    <!-- Create Contract Form (Left Side) -->
    <div class="card p-5! shadow-sm bg-white rounded-2xl border border-gray-100 flex flex-col justify-between">
      <div>
        <h3 class="text-lg font-bold text-gray-800 mb-4! pb-2! border-b border-gray-100">إضافة عقد جديد</h3>
        
        <div class="flex flex-col gap-4">
          <!-- Supplier Select -->
          <div class="flex flex-col gap-1.5">
            <label for="conSupplier" class="text-sm font-medium text-gray-700">المورد <span class="text-red-500">*</span></label>
            <p-select
              id="conSupplier"
              [options]="supplierOptions()"
              [(ngModel)]="selectedSupplier"
              optionLabel="name"
              optionValue="value"
              [filter]="true"
              filterBy="name"
              [showClear]="true"
              placeholder="اختر المورد المتعاقد معه"
              class="w-full h-10 text-sm"
            ></p-select>
          </div>

          <!-- Contract Number -->
          <div class="flex flex-col gap-1.5">
            <label for="conNumber" class="text-sm font-medium text-gray-700">رقم العقد <span class="text-red-500">*</span></label>
            <input 
              id="conNumber" 
              type="text" 
              pInputText 
              [(ngModel)]="contractNumber" 
              placeholder="مثال: MC-2026-0091"
              class="w-full h-10 text-sm" 
            />
          </div>

          <!-- Start Date -->
          <div class="flex flex-col gap-1.5">
            <label for="conStart" class="text-sm font-medium text-gray-700">تاريخ بدء العقد <span class="text-red-500">*</span></label>
            <input 
              id="conStart" 
              type="date" 
              pInputText 
              [(ngModel)]="startDate" 
              class="w-full h-10 text-sm" 
            />
          </div>

          <!-- End Date -->
          <div class="flex flex-col gap-1.5">
            <label for="conEnd" class="text-sm font-medium text-gray-700">تاريخ انتهاء العقد <span class="text-red-500">*</span></label>
            <input 
              id="conEnd" 
              type="date" 
              pInputText 
              [(ngModel)]="endDate" 
              class="w-full h-10 text-sm" 
            />
          </div>
        </div>
      </div>

      <div class="mt-6 pt-4 border-t border-gray-100">
        <button 
          pButton 
          (click)="onSubmit()"
          class="w-full h-11 bg-primary text-white font-semibold flex items-center justify-center gap-2 rounded-xl hover:bg-primary-hover transition-all"
        >
          <i class="pi pi-check"></i>
          <span>حفظ البيانات</span>
        </button>
      </div>
    </div>
  </div>
</div>
